name: album_filmes_app
description: "Seu album de filmes pessoal!"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # BUG FIX: flutter_localizations readicionado para forçar pt-BR no DatePicker.
  # O congelamento anterior era causado por falta de firebase config (google-services.json),
  # não pelo flutter_localizations em si. Com Firebase configurado corretamente, é seguro usá-lo.
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  http: ^1.1.0
  flutter_dotenv: ^5.0.2
  firebase_auth: ^5.5.2
  google_fonts: ^6.2.1
  provider: ^6.1.4
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  flutter_screenutil : ^5.9.3
  cached_network_image: ^3.2.0
  scrollable_positioned_list: ^0.3.5
  flutter_rating_bar: ^4.0.1
  scratcher: ^2.5.0
  share_plus: ^10.1.4
  flutter_svg: ^2.1.0
  firebase_analytics: ^11.0.0
  google_mobile_ads: ^5.0.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.4
  image_picker: ^1.1.2
  firebase_storage: ^12.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter_native_splash:
  color: "#0D1B2A"
  image: assets/icon/splash.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/.env
    - assets/icons/user.jpg
    - assets/icons/splash.png
    - assets/icons/achievements/
    - assets/logo.png
    - assets/logo_tiny.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo_tiny.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo_tiny.png"
